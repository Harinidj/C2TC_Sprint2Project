<div class="container-fluid p-0 d-flex" style="min-height: 100vh; background-color: #fcf8fb;">
  
  <nav class="sidebar p-4 shadow-sm" style="width: 280px; background: white; border-radius: 0 40px 40px 0; z-index: 10;">
    <div class="mb-5 text-center">
      <h3 style="color: #ff80ab; font-weight: 800; letter-spacing: -1px;">ADMINCore</h3>
    </div>
    
    <div class="nav flex-column">
      <a class="nav-link active rounded-pill mb-3 p-3 shadow-sm text-center" 
         style="background-color: #fce4ec; color: #5d4037; font-weight: 600; cursor: pointer;">
        🌸 Dashboard
      </a>
      
      <div class="mt-4 px-2 text-center">
        <label class="small fw-bold text-muted mb-2">FIND ADMIN</label>
        <input type="text" [(ngModel)]="searchTerm" 
               class="form-control rounded-pill border-0 bg-light p-3 shadow-sm text-center" 
               placeholder="Search by name...">
      </div>
    </div>
  </nav>

  <main class="flex-grow-1 p-5">
    <header class="mb-5">
      <h1 class="display-5 fw-bold" style="color: #2d3436;">Mall Management System</h1>
      <h4 class="text-muted fw-light">Admin Section</h4>
    </header>

    <div class="card card-cutesy mb-5 p-4 border-0" 
         style="background: linear-gradient(135deg, #e3f2fd 0%, #fce4ec 100%); border-radius: 25px;">
      <div class="row align-items-center">
        <div class="col">
          <h2 class="fw-bold mb-1 text-dark">Hello, Chief! 👋</h2>
          <p class="mb-0 text-secondary">The system is running smoothly today.</p>
        </div>
        <div class="col-auto text-center border-start border-white ps-5">
          <h1 class="display-4 fw-bold mb-0 text-dark">{{users.length}}</h1>
          <span class="small text-uppercase fw-bold text-muted">Total Admins</span>
        </div>
      </div>
    </div>

    <div class="card p-4 border-0 shadow-sm" style="border-radius: 25px; background: white;">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold m-0">Admin Directory</h4>
        <button (click)="openAddModal()" class="btn text-white rounded-pill px-5 py-2 fw-bold shadow-sm" 
                style="background-color: #ff80ab; border: none;">
          + Create Admin
        </button>
      </div>

      <table class="table align-middle">
        <thead>
          <tr class="text-muted small text-uppercase">
            <th>ID</th>
            <th>Admin Name</th>
            <th>Email</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of filteredAdmins">
            <td class="text-muted">#{{user.id}}</td>
            <td><strong>{{user.name}}</strong></td>
            <td>{{user.email}}</td>
            <td class="text-end">
              <button (click)="openEditModal(user)" class="btn btn-sm rounded-pill px-3 me-2" style="background: #e3f2fd; border: none;">Edit</button>
              <button (click)="onDelete(user.id)" class="btn btn-sm rounded-pill px-3" style="background: #ffebee; color: #d32f2f; border: none;">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal fade show d-block" *ngIf="showModal" tabindex="-1" style="background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content p-4 border-0" style="border-radius: 25px;">
      <div class="modal-header border-0">
        <h5 class="fw-bold">{{ isEditMode ? 'Edit Admin' : 'Add New Admin' }}</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body">
        <input type="text" [(ngModel)]="currentUser.name" class="form-control rounded-pill mb-3 bg-light border-0 p-3" placeholder="Full Name">
        <input type="email" [(ngModel)]="currentUser.email" class="form-control rounded-pill bg-light border-0 p-3" placeholder="Email Address">
      </div>
      <div class="modal-footer border-0">
        <button (click)="closeModal()" class="btn btn-light rounded-pill px-4">Cancel</button>
        <button (click)="saveUser()" class="btn text-white rounded-pill px-4" style="background-color: #ff80ab;">Save Changes</button>
      </div>
    </div>
  </div>
</div>
